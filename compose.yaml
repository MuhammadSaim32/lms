services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
       ./server/.env
    ports:
      - "8000:8000"
    restart: unless-stopped  
                        

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    env_file:
       ./client/.env.local
    ports:
        - "3000:3000"
    restart: unless-stopped
    depends_on:
        - server                       